# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: Python Quality

run-name: Python Quality • ${{ github.ref_name }} @${{ github.actor }}

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: python-quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha || github.ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  python:
    name: Python lint, typecheck, test, and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lint Python
        run: npm run lint:python

      - name: Typecheck Python
        run: npm run typecheck:python

      - name: Test Python with coverage
        run: npm run test:python

      - name: Compile Python
        run: npm run compile:python

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && hashFiles('test-report.junit.xml') != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          slug: ${{ github.repository }}
          files: test-report.junit.xml
          flags: python
          name: pytest-junit-python
          plugins: noop
          report_type: test_results
          fail_ci_if_error: true
          disable_search: true
          verbose: true

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && hashFiles('coverage/python-coverage.xml') != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          slug: ${{ github.repository }}
          files: coverage/python-coverage.xml
          flags: python
          name: pytest-coverage-python
          plugins: noop
          report_type: coverage
          fail_ci_if_error: true
          disable_search: true
          verbose: true
